<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center font-sans">

    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-red-500 mb-2">🛡️ SOC Defense</h1>
            <p class="text-gray-400" id="form-subtitle">Đăng nhập vào hệ thống</p>
        </div>

        <div class="flex mb-6 bg-gray-900 rounded-lg p-1">
            <button onclick="toggleMode('login')" id="btn-login" class="flex-1 py-2 rounded-md bg-gray-700 font-semibold transition-colors">Đăng nhập</button>
            <button onclick="toggleMode('register')" id="btn-register" class="flex-1 py-2 rounded-md text-gray-400 hover:text-white transition-colors">Đăng ký</button>
        </div>

        <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Email</label>
                <input type="email" id="email" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-red-500 transition-colors">
            </div>
            
            <div id="username-field" class="hidden">
                <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                <input type="text" id="username" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Mật khẩu</label>
                <input type="password" id="password" required class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <div id="error-msg" class="text-red-500 text-sm hidden text-center font-medium"></div>
            <div id="success-msg" class="text-green-500 text-sm hidden text-center font-medium"></div>

            <button type="submit" id="submit-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition-colors mt-4">
                Đăng nhập
            </button>
        </form>
    </div>

    <script>
        let isLoginMode = true;
        const BASE_URL = `http://${window.location.hostname}:8000`;// Đổi thành IP server của bạn nếu cần

        function toggleMode(mode) {
            isLoginMode = mode === 'login';
            
            // Cập nhật UI nút bấm
            document.getElementById('btn-login').className = isLoginMode ? 'flex-1 py-2 rounded-md bg-gray-700 font-semibold transition-colors' : 'flex-1 py-2 rounded-md text-gray-400 hover:text-white transition-colors';
            document.getElementById('btn-register').className = !isLoginMode ? 'flex-1 py-2 rounded-md bg-gray-700 font-semibold transition-colors' : 'flex-1 py-2 rounded-md text-gray-400 hover:text-white transition-colors';
            
            // Ẩn/hiện trường Username
            document.getElementById('username-field').style.display = isLoginMode ? 'none' : 'block';
            if (!isLoginMode) document.getElementById('username').required = true;
            else document.getElementById('username').required = false;

            // Đổi Text
            document.getElementById('form-subtitle').innerText = isLoginMode ? 'Đăng nhập vào hệ thống' : 'Tạo tài khoản mới';
            document.getElementById('submit-btn').innerText = isLoginMode ? 'Đăng nhập' : 'Đăng ký';
            
            // Reset thông báo
            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('success-msg').classList.add('hidden');
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;
            
            const errorDiv = document.getElementById('error-msg');
            const successDiv = document.getElementById('success-msg');
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            try {
                if (isLoginMode) {
                    // GỌI API ĐĂNG NHẬP
                    // FastAPI mặc định dùng form-urlencoded cho OAuth2PasswordRequestForm
                    const formData = new URLSearchParams();
                    formData.append('username', email); // Dùng email làm định danh đăng nhập
                    formData.append('password', password);

                    const response = await axios.post(`${BASE_URL}/api/auth/login`, formData);
                    
                    // LƯU TOKEN VÀO LOCAL STORAGE (Cách ReactJS sẽ làm)
                    localStorage.setItem('soc_token', response.data.access_token);
                    
                    successDiv.innerText = "Đăng nhập thành công! Đang chuyển hướng...";
                    successDiv.classList.remove('hidden');
                    
                    setTimeout(() => { window.location.href = '/'; }, 1000);

                } else {
                    // GỌI API ĐĂNG KÝ (Gửi JSON)
                    const payload = { email, password, username };
                    await axios.post(`${BASE_URL}/api/auth/register`, payload);
                    
                    successDiv.innerText = "Đăng ký thành công! Vui lòng đăng nhập.";
                    successDiv.classList.remove('hidden');
                    setTimeout(() => { toggleMode('login'); }, 1500);
                }
            } catch (err) {
                errorDiv.innerText = err.response?.data?.detail || "Có lỗi xảy ra, không thể kết nối server!";
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
